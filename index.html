<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Stundennachweis – Prototyp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --kalkweiss:#F5F3EE;
    --kalkweiss-2:#EAE6DC;
    --werkstattgrau:#2B2F36;
    --werkstattgrau-2:#20232A;
    --papier:#FFFFFF;
    --tinte:#2B2F36;
    --tinte-soft:#6b6f78;
    --baustellenorange:#E8622C;
    --baustellenorange-dark:#C94E1D;
    --linie:#DDD7C9;
    --schatten: 0 1px 2px rgba(43,47,54,.06), 0 6px 16px rgba(43,47,54,.06);

    --cat-montage:#3E5C76;
    --cat-anfahrt:#A9A29B;
    --cat-werkstatt:#A65D3F;
    --cat-planung:#6C6478;
    --cat-urlaub:#4C7A5D;
    --cat-krank:#B84A3E;
    --cat-feiertag:#D9A441;

    --bg: var(--kalkweiss);
    --bg-2: var(--kalkweiss-2);
    --surface: var(--papier);
    --text: var(--tinte);
    --text-soft: var(--tinte-soft);
    --line: var(--linie);

    --glass-bg: rgba(255,255,255,.52);
    --glass-bg-strong: rgba(255,255,255,.68);
    --glass-bg-solid-ish: rgba(255,255,255,.82);
    --glass-border: rgba(255,255,255,.65);
    --glass-shadow: 0 10px 36px rgba(43,47,54,.14), 0 2px 8px rgba(43,47,54,.07);
    --glass-gloss: linear-gradient(180deg, rgba(255,255,255,.6), rgba(255,255,255,0) 45%);
    --glass-blur: blur(24px) saturate(180%);
  }
  body.dark{
    --bg: var(--werkstattgrau-2);
    --bg-2: #262a31;
    --surface: #31353d;
    --text: #F1EFE9;
    --text-soft: #A7ACB5;
    --line: #3d424b;
    --schatten: 0 1px 2px rgba(0,0,0,.3), 0 8px 20px rgba(0,0,0,.35);

    --glass-bg: rgba(49,53,61,.5);
    --glass-bg-strong: rgba(38,42,49,.7);
    --glass-bg-solid-ish: rgba(38,42,49,.86);
    --glass-border: rgba(255,255,255,.09);
    --glass-shadow: 0 10px 36px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3);
    --glass-gloss: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,0) 45%);
    --glass-blur: blur(24px) saturate(160%);
  }
  :root{
    --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  input, textarea{ -webkit-user-select:text; user-select:text; }
  *, *::before, *::after{ font-family: var(--font-stack) !important; }
  html,body{margin:0;padding:0; overflow:hidden; height:100%; width:100%; position:fixed; overscroll-behavior:none;}
  body{
    font-family: var(--font-stack);
    background: var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    height:100%;
    transition:background .25s ease, color .25s ease;
  }
  .device{
    width:100%;
    max-width:560px;
    background:
      radial-gradient(circle at 15% 0%, color-mix(in srgb, var(--baustellenorange) 10%, transparent), transparent 45%),
      radial-gradient(circle at 85% 30%, color-mix(in srgb, var(--cat-montage) 8%, transparent), transparent 50%),
      radial-gradient(circle at 20% 90%, color-mix(in srgb, var(--cat-urlaub) 7%, transparent), transparent 50%),
      var(--bg);
    background-attachment:fixed;
    overflow-x:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
  }
  header.appbar{
    padding:20px 18px 12px 18px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
    background:color-mix(in srgb, var(--bg) 40%, transparent);
    -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px);
    position:relative; z-index:5;
    touch-action:none; overflow:hidden; overscroll-behavior:none;
  }
  .brand{display:flex; flex-direction:column; line-height:1;}
  .brand .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--baustellenorange); font-weight:600; margin-bottom:2px;
  }
  .brand h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:26px; letter-spacing:.02em; margin:0; font-weight:400;
  }
  .icon-btn{
    width:38px; height:38px; border-radius:14px;
    border:1px solid var(--glass-border); background:var(--glass-bg);
    -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    box-shadow:var(--glass-shadow);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text); flex-shrink:0;
    transition:transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s ease;
  }
  .icon-btn:active{ transform:scale(.9); box-shadow:0 2px 8px rgba(43,47,54,.12); }
  .header-tools{
    display:flex; align-items:center; gap:8px; padding:0 18px 12px 18px; flex-shrink:0;
    border-bottom:1px solid var(--line);
  }
  .header-tools-group{ cursor:pointer; line-height:1.15; }
  .header-tool-main{ font-family:'Bebas Neue', sans-serif; font-size:16px; }
  .header-tool-unit{ font-size:9px; font-weight:600; color:var(--text-soft); font-family:'IBM Plex Sans', sans-serif; }
  .header-tool-sub{ font-size:9px; color:var(--text-soft); font-weight:600; }
  .header-tools-spacer{ flex:1; }
  .header-diet-btn{
    display:flex; align-items:center; gap:6px;
    padding:7px 11px; border-radius:20px; border:1px solid var(--line); background:var(--surface);
    color:var(--text); font-size:10.5px; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  main{
    flex:1; overflow-y:auto; overflow-x:hidden; padding:4px 18px 100px 18px;
    -ms-overflow-style:none; scrollbar-width:none;
    -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
  }
  main::-webkit-scrollbar{display:none;}
  #view-container{ animation:viewFadeIn .4s cubic-bezier(.22,1,.36,1); }
  @keyframes viewFadeIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* punch-card motif */
  .card{
    background:var(--glass-bg);
    -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border-radius:26px;
    box-shadow: var(--glass-shadow);
    border:1px solid var(--glass-border);
    position:relative;
    margin-bottom:14px;
    overflow:hidden;
    transition:transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s ease;
  }
  .card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:50%;
    background:var(--glass-gloss); pointer-events:none; z-index:0;
  }
  .card > *{ position:relative; z-index:1; }
  .perforation{
    height:14px;
    background-image: radial-gradient(circle, var(--bg) 3.5px, transparent 3.6px);
    background-size: 18px 14px;
    background-position: 6px 0;
    border-bottom:1px dashed var(--line);
  }
  .card-body{ padding:16px 18px 18px 18px; }

  .hero{
    padding:0;
  }
  .hero .card-body{ padding:18px 20px 20px 20px; }
  .hero-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; text-transform:uppercase; letter-spacing:.1em;
    color:var(--text-soft); margin-bottom:4px;
  }
  .hero-number{
    font-family:'Bebas Neue', sans-serif;
    font-size:56px; line-height:1; color:var(--baustellenorange);
    display:flex; align-items:baseline; gap:6px;
  }
  .hero-number span.unit{ font-size:20px; color:var(--text-soft); font-family:'IBM Plex Sans'; }
  .hero-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .stat-mini{
    background:color-mix(in srgb, var(--bg) 55%, transparent); border-radius:16px; padding:10px 12px; border:1px solid var(--glass-border);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
  }
  .stat-mini .n{ font-family:'Bebas Neue'; font-size:24px; }
  .stat-mini .l{ font-size:11px; color:var(--text-soft); }
  .last-activity{
    margin-top:14px; padding-top:12px; border-top:1px dashed var(--line);
    font-size:13px; color:var(--text-soft);
  }
  .last-activity b{ color:var(--text); font-weight:600; }

  .section-title{
    font-family:'Bebas Neue'; font-size:19px; letter-spacing:.02em;
    margin: 18px 0 8px 2px; color:var(--text);
  }

  .fab{
    position:absolute; right:18px; bottom:92px;
    width:56px; height:56px; border-radius:20px;
    background:linear-gradient(160deg, var(--baustellenorange), var(--baustellenorange-dark));
    color:white;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 26px rgba(232,98,44,.5), inset 0 1px 1px rgba(255,255,255,.4);
    border:1px solid rgba(255,255,255,.25); cursor:pointer; z-index:15;
    transition:transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s ease;
  }
  .fab:active{ transform:scale(.9); box-shadow:0 4px 14px rgba(232,98,44,.4); }

  nav.tabbar{
    position:absolute; left:0; right:0; bottom:0;
    background:var(--glass-bg-strong);
    -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border-top:1px solid var(--glass-border);
    box-shadow:0 -4px 24px rgba(43,47,54,.06);
    display:flex; padding:8px 6px max(14px, env(safe-area-inset-bottom)) 6px; flex-shrink:0; z-index:10;
    touch-action:none; overflow:hidden; overscroll-behavior:none;
  }
  .tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:7px 2px; border-radius:16px; cursor:pointer; color:var(--text-soft);
    background:none; border:none; font-family:inherit;
    transition:transform .18s cubic-bezier(.22,1,.36,1), background .25s ease, color .25s ease;
  }
  .tab:active{ transform:scale(.9); }
  .tab.active{
    color:var(--baustellenorange);
    background:color-mix(in srgb, var(--baustellenorange) 14%, transparent);
    box-shadow:0 0 0 1px color-mix(in srgb, var(--baustellenorange) 30%, transparent), 0 2px 10px color-mix(in srgb, var(--baustellenorange) 25%, transparent);
  }
  .tab svg{ width:22px; height:22px; }
  .tab .tlabel{ font-size:10px; font-weight:600; }

  /* Kalender */
  .cal-nav{ display:flex; align-items:center; justify-content:space-between; margin:8px 0 12px 0; }
  .cal-nav .month-label{ font-family:'Bebas Neue'; font-size:20px; }
  .current-month-badge{
    font-family:'IBM Plex Mono', monospace; font-size:9px; font-weight:700; text-transform:uppercase;
    color:var(--baustellenorange); background:color-mix(in srgb, var(--baustellenorange) 14%, transparent);
    padding:2px 7px; border-radius:20px; vertical-align:middle; margin-left:4px; letter-spacing:.03em;
  }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-dow{ text-align:center; font-size:10px; color:var(--text-soft); font-weight:600; padding-bottom:4px; }
  .cal-cell{
    aspect-ratio:1/1; border-radius:10px; background:var(--surface); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
    position:relative; font-size:12px;
  }
  .cal-cell.empty{ background:transparent; border:none; cursor:default; }
  .cal-cell .d{ font-weight:600; }
  .cal-cell .dot{ width:6px; height:6px; border-radius:50%; margin-top:3px; }
  .cal-cell.today{ border:1.5px solid var(--baustellenorange); }
  .cal-cell .hrs{ font-size:9px; color:var(--text-soft); margin-top:1px; }

  .legend{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .legend-item{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-soft); }
  .legend-dot{ width:8px; height:8px; border-radius:50%; }

  /* Mini-Wochenkalender (Dashboard) */
  .mini-cal-dow-row{ display:grid; grid-template-columns:32px repeat(7,1fr) 46px; gap:3px; margin-bottom:8px; }
  .mini-cal-week{ display:grid; grid-template-columns:32px repeat(7,1fr) 46px; gap:3px; align-items:center; padding:6px 0; margin-bottom:8px; border-radius:10px; }
  .mini-cal-week:last-child{ margin-bottom:0; }
  .mini-cal-week.current-week{ background: color-mix(in srgb, var(--baustellenorange) 7%, transparent); }
  .kw-badge{ font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--text-soft); font-weight:700; padding-left:2px; }
  .mini-day{
    aspect-ratio:1/1; border-radius:10px; display:flex; align-items:center; justify-content:center;
    position:relative; font-size:10.5px; font-weight:600; cursor:pointer; background:var(--glass-bg);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    border:1px solid var(--glass-border); color:var(--text);
    transition:transform .15s cubic-bezier(.22,1,.36,1);
  }
  .mini-day:active{ transform:scale(.9); }
  .mini-day.other-month{ opacity:.32; }
  .mini-day.today{ border-color:var(--baustellenorange); border-width:1.5px; color:var(--baustellenorange); }
  .mini-day .mdot{ position:absolute; bottom:2px; width:5px; height:5px; border-radius:50%; }
  .mini-week-total{ font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:12px; text-align:right; color:var(--text-soft); padding-right:2px; }
  .mini-week-total.current{ color:var(--baustellenorange); }

  /* Woche / Liste */
  .week-row-wrap{ border-bottom:1px solid var(--glass-border); }
  .week-row-wrap:last-child{ border-bottom:none; }
  .week-row{
    display:flex; align-items:center; gap:10px; padding:12px 4px; cursor:pointer;
  }
  .week-day-badge{
    width:42px; height:42px; border-radius:14px; background:var(--glass-bg); border:1px solid var(--glass-border);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0;
  }
  .week-day-badge .dow{ font-size:9px; color:var(--text-soft); font-weight:700; text-transform:uppercase; }
  .week-day-badge .dom{ font-size:14px; font-weight:600; }
  .week-bar-track{ flex:1; min-width:0; height:8px; background:color-mix(in srgb, var(--bg) 60%, transparent); border-radius:6px; overflow:hidden; }
  .week-bar-fill{ height:100%; border-radius:6px; background:var(--baustellenorange); }
  .week-hours{ font-family:'IBM Plex Mono'; font-size:13px; font-weight:600; width:44px; text-align:right; flex-shrink:0; }
  .week-chevron{ color:var(--text-soft); flex-shrink:0; transition:transform .28s cubic-bezier(.22,1,.36,1); }
  .week-chevron.open{ transform:rotate(180deg); }
  .week-detail{ padding:2px 4px 16px 56px; }
  .week-detail-row{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-soft); margin-bottom:5px; }
  .week-detail-row b{ color:var(--text); font-weight:600; }
  .week-detail-note{ font-size:12.5px; color:var(--text); line-height:1.5; margin:8px 0 10px 0; background:var(--glass-bg); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:14px; padding:10px 12px; }

  .empty-state{
    text-align:center; padding:40px 20px; color:var(--text-soft);
  }
  .empty-state svg{ opacity:.5; margin-bottom:10px; }

  input, select, textarea, button{ font-family:'IBM Plex Sans', sans-serif; }
  label.field-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-soft);
    font-weight:600; display:block; margin-bottom:6px;
  }
  select.time-select{
    font-family:'IBM Plex Mono'; font-weight:600; font-size:14px;
    padding:9px 6px; border-radius:12px; border:1px solid var(--glass-border);
    background:var(--glass-bg); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); color:var(--text);
    width:100%; min-width:0; flex:1 1 0;
  }
  .block-row{ display:flex; align-items:center; gap:6px; margin-bottom:8px; flex-wrap:nowrap; max-width:100%; }
  .block-row .arrow{ color:var(--text-soft); flex-shrink:0; }
  .block-hours-mini{ font-size:10px; color:var(--text-soft); font-weight:600; white-space:nowrap; flex-shrink:0; }
  .remove-btn{
    width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--surface);
    color:var(--cat-krank); cursor:pointer; flex-shrink:0; font-size:16px; line-height:1;
  }
  .site-row{
    display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--glass-border);
    background:var(--bg); transition:opacity .15s ease;
  }
  .site-row.dragging{ opacity:.45; }
  .drag-handle{
    background:none; border:none; color:var(--text-soft); cursor:grab; touch-action:none;
    flex-shrink:0; padding:2px; display:flex; align-items:center;
  }
  .fav-star{ width:15px; flex-shrink:0; display:flex; align-items:center; }
  .add-block-btn{
    width:100%; padding:11px; border-radius:16px; border:1.5px dashed var(--glass-border); background:var(--glass-bg);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    color:var(--text-soft); font-weight:600; font-size:13px; cursor:pointer; margin-bottom:14px;
    transition:transform .15s cubic-bezier(.22,1,.36,1);
  }
  .add-block-btn:active{ transform:scale(.97); }
  .cat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
  .cat-chip{
    padding:9px 6px; border-radius:16px; border:1.5px solid var(--glass-border); background:var(--glass-bg);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    display:flex; align-items:center; gap:6px; cursor:pointer; font-size:11.5px; font-weight:600; color:var(--text);
    transition:transform .15s cubic-bezier(.22,1,.36,1), background .2s ease;
  }
  .cat-chip:active{ transform:scale(.95); }
  .cat-chip .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .cat-chip.selected{ border-color:var(--baustellenorange); background: color-mix(in srgb, var(--baustellenorange) 20%, var(--glass-bg)); box-shadow:0 2px 10px color-mix(in srgb, var(--baustellenorange) 25%, transparent); }
  .day-chip{ flex-direction:column; justify-content:center; gap:3px; padding:8px 2px; }
  .day-dot{ width:5px; height:5px; border-radius:50%; background:var(--baustellenorange); }
  .diet-toggle-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; margin-bottom:10px; border-radius:16px;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
  }
  .diet-toggle-label{ display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600; color:var(--text); }
  .accent-swatch{
    aspect-ratio:1/1; border-radius:16px; border:2px solid transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#fff;
    box-shadow:var(--glass-shadow); transition:transform .15s cubic-bezier(.22,1,.36,1);
  }
  .accent-swatch:active{ transform:scale(.88); }
  .accent-swatch.selected{ border-color:#fff; box-shadow:0 0 0 3px rgba(0,0,0,.18), var(--glass-shadow); }
  .sync-dot{
    position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%;
    background:transparent; transition:background .2s ease;
  }
  .sync-dot.dirty{ background:var(--cat-krank); box-shadow:0 0 0 2px var(--surface); }

  textarea.note-area{
    width:100%; min-height:150px; border-radius:20px; border:1px solid var(--glass-border); background:var(--glass-bg);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    color:var(--text); padding:14px 54px 14px 14px; font-size:14px; resize:vertical; margin-bottom:14px;
  }
  .note-wrap{ position:relative; }
  .mic-btn{
    position:absolute; bottom:24px; right:12px;
    width:38px; height:38px; border-radius:50%; border:1px solid rgba(255,255,255,.3); cursor:pointer;
    background:linear-gradient(160deg, var(--baustellenorange), var(--baustellenorange-dark)); color:white;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(232,98,44,.45), inset 0 1px 1px rgba(255,255,255,.4); z-index:2;
    transition:transform .18s cubic-bezier(.22,1,.36,1);
  }
  .mic-btn:active{ transform:scale(.9); }
  .mic-btn.recording{ background:var(--cat-krank); box-shadow:0 0 0 0 rgba(184,74,62,.5); animation: mic-pulse 1.2s infinite; }
  @keyframes mic-pulse{
    0%{ box-shadow:0 0 0 0 rgba(184,74,62,.55); }
    70%{ box-shadow:0 0 0 12px rgba(184,74,62,0); }
    100%{ box-shadow:0 0 0 0 rgba(184,74,62,0); }
  }

  .primary-btn{
    width:100%; padding:14px; border-radius:18px; border:1px solid rgba(255,255,255,.25);
    background:linear-gradient(160deg, var(--baustellenorange), var(--baustellenorange-dark));
    box-shadow:0 8px 22px rgba(232,98,44,.4), inset 0 1px 1px rgba(255,255,255,.35);
    color:white; font-weight:700; font-size:15px; cursor:pointer; margin-top:4px;

(function(){

  function timeOptions(){
    let opts = [];
    for(let h=0; h<24; h++){

        opts.push(`${pad(h)}:${pad(m)}`);
      }
    }
    return opts;
  }
  const TIME_OPTS = timeOptions();

  function blockHours(b){
    const [sh,sm] = b.start.split(":").map(Number);
    const [eh,em] = b.end.split(":").map(Number);
    let mins = (eh*60+em) - (sh*60+sm);
    if(mins < 0) mins = 0;
    return mins/60;
  }
  function toMin(t){ const [h,m] = t.split(":").map(Number); return h*60+m; }
  function minutesToHHMM(mins){ const h=Math.floor(mins/60), m=mins%60; return pad(h)+":"+pad(m); }
  function overlapIndices(blocks){
    const idxs = new Set();
    for(let i=0;i<blocks.length;i++){
      if(blocks[i].start===blocks[i].end) continue;
      for(let j=i+1;j<blocks.length;j++){
        if(blocks[j].start===blocks[j].end) continue;
        const aS=toMin(blocks[i].start), aE=toMin(blocks[i].end);
        const bS=toMin(blocks[j].start), bE=toMin(blocks[j].end);
        if(aS<bE && bS<aE){ idxs.add(i); idxs.add(j); }
      }
    }
    return idxs;
  }
  function blocksOverlap(blocks){ return overlapIndices(blocks).size > 0; }
  function dayHours(entry){
    if(!entry || !entry.blocks) return 0;
    return entry.blocks.reduce((a,b)=>a+blockHours(b),0);
  }

  async function writeDataToHandle(){
    if(!fileHandle) return false;

      await writable.close();
      lastSyncTime = data.savedAt;

      updateSyncStatusUI();
      return true;
    }catch(e){ console.error("Datei schreiben fehlgeschlagen", e); return false; }

    const headers = { Accept:"application/vnd.github+json" };

  const DROPBOX_APP_KEY_STORAGE_HINT = "dropbox_app_key"; // nur als URL-Param-Name, keine Speicherung
  function currentUrlWithoutHash(){ return window.location.href.split('#')[0].split('?')[0]; }
  function dropboxAuthorize(appKey){
    if(!appKey){ showToast("Bitte zuerst den Dropbox App-Key eingeben"); return; }
    dropboxAppKey = appKey;
    const redirectUri = currentUrlWithoutHash();
    const url = `https://www.dropbox.com/oauth2/authorize?client_id=${encodeURIComponent(appKey)}&response_type=token&redirect_uri=${encodeURIComponent(redirectUri)}`;
    window.location.href = url; // Weiterleitung zu Dropbox-Login, kommt per Redirect zurück
  }
  function checkDropboxRedirect(){
    if(!window.location.hash) return false;
    const params = new URLSearchParams(window.location.hash.slice(1));
    const token = params.get("access_token");
    if(token){
      dropboxToken = token;
      syncMode = "dropbox";
      history.replaceState(null, "", currentUrlWithoutHash()); // Token aus der Adresszeile entfernen
      return true;
    }
    return false;
  }
  async function dropboxListSaves(){
    const res = await fetch("https://api.dropboxapi.com/2/files/list_folder", {
      method:"POST",
      headers:{ Authorization:`Bearer ${dropboxToken}`, "Content-Type":"application/json" },
      body: JSON.stringify({ path:"/saves" })
    });
    if(res.status === 409) return []; // Ordner existiert noch nicht
    if(!res.ok) throw new Error("Dropbox-Liste fehlgeschlagen (" + res.status + ")");
    const data = await res.json();
    return (data.entries || []).filter(e=>e[".tag"]==="file" && e.name.endsWith(".json"));

      headers:{ Authorization:`Bearer ${dropboxToken}`, "Dropbox-API-Arg": JSON.stringify({ path: latest.path_lower }) }

  /* ---------- Berechnungen ---------- */
  function weekRange(d){
    const day = (d.getDay()+6)%7; // Montag=0
    const monday = new Date(d); monday.setDate(d.getDate()-day);
    const days = [];
    for(let i=0;i<7;i++){ const x = new Date(monday); x.setDate(monday.getDate()+i); days.push(x); }
    return days;
  }
  function isoWeek(date){
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = (d.getUTCDay()+6)%7;
    d.setUTCDate(d.getUTCDate()-dayNum+3);
    const firstThursday = new Date(Date.UTC(d.getUTCFullYear(),0,4));
    const diff = d - firstThursday;
    return 1 + Math.round(diff/(7*24*60*60*1000));
  }
  function buildWeeksForMonth(cursor){
    const y = cursor.getFullYear(), m = cursor.getMonth();
    const first = new Date(y,m,1);
    const last = new Date(y,m+1,0);
    const firstMonday = weekRange(first)[0];
    const lastMonday = weekRange(last)[0];
    const todayMonday = weekRange(new Date())[0];
    const weeks = [];
    let cur = new Date(firstMonday);
    while(cur <= lastMonday){
      const days = weekRange(cur);
      const total = days.reduce((a,d)=>a+dayHours(entries[dstr(d)]),0);
      weeks.push({
        weekNum: isoWeek(days[0]),
        days,
        total,
        isCurrent: dstr(days[0])===dstr(todayMonday)
      });
      cur = new Date(cur); cur.setDate(cur.getDate()+7);
    }
    return weeks;
  }
  function monthEntries(year, month){
    return Object.entries(entries).filter(([k])=>{
      const [y,m] = k.split("-").map(Number);
      return y===year && (m-1)===month;
    });
  }

  function normCat(s){ return (s||"").trim().toLowerCase(); }
  function getPreset(text){
    const n = normCat(text);
    if(!n) return null;
    return Object.values(CATS).find(v=>v.label.toLowerCase()===n) || null;
  }
  const CUSTOM_PALETTE = ["#7C6354","#5B7C99","#8A6BAF","#4F8A76","#B57B3F","#6E7E8C","#9C6B6B"];
  function catColor(text){
    const p = getPreset(text);
    if(p) return p.color;
    if(!text || !text.trim()) return "var(--text-soft)";
    let hash = 0;
    for(let i=0;i<text.length;i++){ hash = text.charCodeAt(i) + ((hash<<5)-hash); }
    return CUSTOM_PALETTE[Math.abs(hash) % CUSTOM_PALETTE.length];
  }
  function catLabel(text){ return (text && text.trim()) ? text : "Ohne Kategorie"; }
  function isNonWorkCategory(text){
    const n = normCat(text);
    return n.includes("urlaub") || n.includes("krank") || n.includes("feiertag");
  }

  function renderMonat(){
    headerTitle.textContent = "Monat";
    const y = monatCursor.getFullYear(), m = monatCursor.getMonth();
    const today = new Date();
    const isCurrentMonth = (y===today.getFullYear() && m===today.getMonth());
    const list = monthEntries(y,m);
    const total = list.reduce((a,[,e])=>a+dayHours(e),0);
    const workdays = list.filter(([,e])=>!isNonWorkCategory(e.category) && dayHours(e)>0).length;
    const weeklyHours = TRADES[selectedTrade]?.hours || 39;
    const daysInThisMonth = new Date(y, m+1, 0).getDate();
    const soll = weeklyHours * (daysInThisMonth/7);
    const overtime = total - soll;
    const avg = workdays ? total/workdays : 0;

    // Wochen-Balken für den Monat
    const weeksMap = {};
    list.forEach(([dt,e])=>{
      const d = new Date(dt+"T00:00:00");
      const monday = weekRange(d)[0];
      const key = dstr(monday);
      weeksMap[key] = (weeksMap[key]||0) + dayHours(e);
    });
    const weekKeys = Object.keys(weeksMap).sort();
    const maxWeek = Math.max(...weekKeys.map(k=>weeksMap[k]), weeklyHours, 1);
    const targetLinePct = Math.min(100, (weeklyHours/maxWeek)*100);
    const wageRate = WAGE_CATEGORIES[selectedWage]?.rate || 19.99;

          <div class="stat-mini" style="margin-top:10px;"><div class="n">${fmtH(avg)}</div><div class="l">Ø Std./Arbeitstag</div></div>
          <div class="stat-mini" style="margin-top:10px;"><div class="n">${fmtH(soll)}</div><div class="l">Sollstunden Monat (${escapeHtml(TRADES[selectedTrade]?.label || "Baugewerbe")})</div></div>

      </div></div>

        <div class="hero-number" style="font-size:32px;">${verdienst.toFixed(2).replace('.',',')}<span class="unit">€</span></div>
        <div style="font-size:11.5px; color:var(--text-soft); margin-top:2px;">${fmtH(total)} Std. × ${wageRate.toFixed(2).replace('.',',')} €/Std. (${escapeHtml(WAGE_CATEGORIES[selectedWage]?.label || "Facharbeiter")})</div>

      <div class="section-title">Kalender – jede Woche im Überblick</div>

        ${renderWeekGridHTML(buildWeeksForMonth(monatCursor), m)}

        <div class="chart-bars">
          ${weekKeys.length ? `<div class="chart-target-line" style="bottom:${targetLinePct}%;"><span class="chart-target-label">${fmtH(weeklyHours)}</span></div>` : ""}

            const h = weeksMap[k];

  function renderBlocks(){
    const c = document.getElementById("blocks-container");
    const previewBlocks = pendingBlock ? draftBlocks.concat([pendingBlock]) : draftBlocks;
    const overlaps = overlapIndices(previewBlocks);
    c.innerHTML = draftBlocks.map((b,i)=>`
      <div class="block-row ${overlaps.has(i)?'overlap':''}">
        <select class="time-select" data-i="${i}" data-field="start">${TIME_OPTS.map(t=>`<option value="${t}" ${t===b.start?'selected':''}>${t}</option>`).join("")}</select>
        <span class="arrow">→</span>
        <select class="time-select" data-i="${i}" data-field="end">${TIME_OPTS.map(t=>`<option value="${t}" ${t===b.end?'selected':''}>${t}</option>`).join("")}</select>
        <span class="block-hours-mini">${fmtH(blockHours(b))} Std.</span>
        ${draftBlocks.length>1 ? `<button class="remove-btn" data-remove="${i}">✕</button>` : `<span style="width:30px;"></span>`}

        <select class="time-select" id="pending-start">${TIME_OPTS.map(t=>`<option value="${t}" ${t===pendingBlock.start?'selected':''}>${t}</option>`).join("")}</select>

    if(pendingBlock){
      document.getElementById("pending-start").onchange = (e)=>{ pendingBlock.start = e.target.value; renderBlocks(); };
      document.getElementById("pending-end").onchange = (e)=>{ pendingBlock.end = e.target.value; renderBlocks(); };

          showWarningPopup("Achtung: Die Zeiten dieser Arbeitsblöcke überschneiden sich. Dadurch werden Stunden doppelt gezählt.");

  function renderClock(){
    const wrap = document.getElementById("clock-container");
    if(!wrap) return;
    if(!showClock){ wrap.innerHTML = ""; wrap.style.display = "none"; return; }
    wrap.style.display = "flex";
    const previewBlocks = pendingBlock ? draftBlocks.concat([pendingBlock]) : draftBlocks;
    wrap.innerHTML = buildClockSVG(previewBlocks);
    attachClockHandlers();
  }
  function attachClockHandlers(){
    const wrap = document.getElementById("clock-container");
    if(!wrap) return;
    const svg = wrap.querySelector("svg");
    if(!svg) return;
    svg.style.touchAction = "none";

    function angleFromEvent(e){
      const rect = svg.getBoundingClientRect();
      const cxScreen = rect.left + rect.width/2;
      const cyScreen = rect.top + rect.height/2;
      const dx = e.clientX - cxScreen;
      const dy = e.clientY - cyScreen;
      let theta = Math.atan2(dx, -dy) * 180/Math.PI;
      if(theta < 0) theta += 360;
      return theta;
    }
    function angDist(a, b){ let d = Math.abs(a-b) % 360; return d>180 ? 360-d : d; }
    function redrawWedgeLive(idx, tempStart, tempEnd, forcedRb){
      const pathEl = svg.querySelector(`.clock-wedge[data-block-idx="${idx}"]`);
      if(!pathEl) return;
      const startMin = toMin(tempStart), endMin = toMin(tempEnd);
      const durationMin = endMin - startMin;
      if(durationMin <= 0 || durationMin >= 720) return; // Randfälle: während des Ziehens nicht live aktualisieren
      const startHour = Number(tempStart.split(":")[0]);
      const isPM = startHour >= 12;
      const Rb = forcedRb !== undefined && forcedRb !== null ? forcedRb : (isPM ? CLOCK_R - 15 : CLOCK_R);
      const a1 = (startMin % 720)/720*360;
      const sweep = durationMin/720*360;
      const a2 = a1 + sweep;
      const large = sweep > 180 ? 1 : 0;
      const rad1 = a1*Math.PI/180, rad2 = a2*Math.PI/180;
      const x1 = 100 + Rb*Math.sin(rad1), y1 = 100 - Rb*Math.cos(rad1);
      const x2 = 100 + Rb*Math.sin(rad2), y2 = 100 - Rb*Math.cos(rad2);
      pathEl.setAttribute("d", `M 100 100 L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${Rb} ${Rb} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`);
      const startDot = svg.querySelector(`.drag-affordance-dot[data-block-idx="${idx}"][data-which="start"]`);
      const endDot = svg.querySelector(`.drag-affordance-dot[data-block-idx="${idx}"][data-which="end"]`);
      if(startDot){ startDot.setAttribute("cx", x1.toFixed(2)); startDot.setAttribute("cy", y1.toFixed(2)); }
      if(endDot){ endDot.setAttribute("cx", x2.toFixed(2)); endDot.setAttribute("cy", y2.toFixed(2)); }
    }
    function updateWedgeLive(idx, which, newValue){
      const b = draftBlocks[idx];
      if(!b) return;
      const tempStart = which==="start" ? newValue : b.start;
      const tempEnd = which==="end" ? newValue : b.end;
      redrawWedgeLive(idx, tempStart, tempEnd, dragState.lockedRb);

      // Nachbarblock live zurückschieben, falls er dadurch überlappen würde
      if(which === "start"){
        const prev = draftBlocks[idx-1];
        if(prev){
          const newStartMin = toMin(newValue);
          if(newStartMin < toMin(prev.end)){
            if(!dragState.pushedNeighbor){
              dragState.neighborLockedRb = (Number(prev.start.split(":")[0]) >= 12) ? CLOCK_R - 15 : CLOCK_R;
            }
            const clamped = Math.max(newStartMin, toMin(prev.start));
            const pushedEnd = minutesToHHMM(clamped);
            dragState.pushedNeighbor = { idx: idx-1, which:"end", value: pushedEnd };
            redrawWedgeLive(idx-1, prev.start, pushedEnd, dragState.neighborLockedRb);
          }else if(dragState.pushedNeighbor){
            redrawWedgeLive(idx-1, prev.start, prev.end);
            dragState.pushedNeighbor = null;
            dragState.neighborLockedRb = null;
          }
        }
      }else{
        const next = draftBlocks[idx+1];
        if(next){
          const newEndMin = toMin(newValue);
          if(newEndMin > toMin(next.start)){
            if(!dragState.pushedNeighbor){
              dragState.neighborLockedRb = (Number(next.start.split(":")[0]) >= 12) ? CLOCK_R - 15 : CLOCK_R;
            }
            const clamped = Math.min(newEndMin, toMin(next.end));
            const pushedStart = minutesToHHMM(clamped);
            dragState.pushedNeighbor = { idx: idx+1, which:"start", value: pushedStart };
            redrawWedgeLive(idx+1, pushedStart, next.end, dragState.neighborLockedRb);
          }else if(dragState.pushedNeighbor){
            redrawWedgeLive(idx+1, next.start, next.end);
            dragState.pushedNeighbor = null;
            dragState.neighborLockedRb = null;
          }
        }
      }
    }
    svg.querySelectorAll(".clock-wedge[data-block-idx]").forEach(pathEl=>{
      const idx = Number(pathEl.dataset.blockIdx);
      pathEl.addEventListener("pointerdown", (e)=>{
        e.preventDefault();
        const b = draftBlocks[idx];
        if(!b) return;
        const theta = angleFromEvent(e);
        const a1 = (toMin(b.start) % 720)/720*360;
        const a2raw = (toMin(b.end) % 720)/720*360;
        const which = angDist(theta, a1) <= angDist(theta, a2raw) ? "start" : "end";
        const draggedVal = b[which];
        const lockedRb = (Number(b.start.split(":")[0]) >= 12) ? CLOCK_R - 15 : CLOCK_R;
        dragState = { which, blockIdx: idx, lockedRb, rawMinutes: toMin(draggedVal), lastAngle: theta, pendingValue: draggedVal };
        try{ pathEl.setPointerCapture(e.pointerId); }catch(err){}
      });
    });

    svg.querySelectorAll(".drag-affordance-dot[data-block-idx]").forEach(dot=>{
      dot.addEventListener("pointerdown", (e)=>{
        e.preventDefault();
        e.stopPropagation();
        const idx = Number(dot.dataset.blockIdx);
        const which = dot.dataset.which;
        const b = draftBlocks[idx];
        if(!b) return;
        const draggedVal = b[which];
        const lockedRb = (Number(b.start.split(":")[0]) >= 12) ? CLOCK_R - 15 : CLOCK_R;
        dragState = { which, blockIdx: idx, lockedRb, rawMinutes: toMin(draggedVal), lastAngle: angleFromEvent(e), pendingValue: draggedVal };
        try{ dot.setPointerCapture(e.pointerId); }catch(err){}
      });
    });

    svg.addEventListener("pointermove", (e)=>{
      if(!dragState) return;
      const theta = angleFromEvent(e);
      let delta = theta - dragState.lastAngle;
      if(delta > 180) delta -= 360;
      if(delta < -180) delta += 360;
      dragState.lastAngle = theta;
      dragState.rawMinutes = Math.max(0, Math.min(1439, dragState.rawMinutes + delta/360*720));
      const step = handSnapMode === "60" ? 60 : 30;
      const snapped = Math.max(0, Math.min(1439, Math.round(dragState.rawMinutes/step)*step));
      const timeStr = minutesToHHMM(snapped);
      dragState.pendingValue = timeStr;
      updateWedgeLive(dragState.blockIdx, dragState.which, timeStr);
    });
    const endDrag = ()=>{
      if(!dragState) return;
      const idx = dragState.blockIdx;
      if(draftBlocks[idx]){
        draftBlocks[idx][dragState.which] = dragState.pendingValue;
      }
      if(dragState.pushedNeighbor && draftBlocks[dragState.pushedNeighbor.idx]){
        draftBlocks[dragState.pushedNeighbor.idx][dragState.pushedNeighbor.which] = dragState.pushedNeighbor.value;
      }
      dragState = null;
      renderBlocks();
      if(blocksOverlap(draftBlocks)){
        showWarningPopup("Achtung: Die Zeiten dieser Arbeitsblöcke überschneiden sich. Dadurch werden Stunden doppelt gezählt.");
      }
    };
    svg.addEventListener("pointerup", endDrag);
    svg.addEventListener("pointercancel", ()=>{ dragState = null; renderClock(); });
  }
  function buildClockSVG(blocks){
    const cx=100, cy=100, R=CLOCK_R;
    const pt = (ang, r)=>{ const rad = ang*Math.PI/180; return [cx + r*Math.sin(rad), cy - r*Math.cos(rad)]; };

    const startMinOf = (b)=>{ const [h,m]=b.start.split(":").map(Number); return h*60+m; };
    const sortedByStart = [...blocks].filter(b=>b.start!==b.end).sort((a,b)=>startMinOf(a)-startMinOf(b));
    const shadeFor = new Map();
    sortedByStart.forEach((b,i)=>{
      shadeFor.set(b, i===0 ? "var(--baustellenorange)" : `color-mix(in srgb, var(--baustellenorange) ${Math.max(35, 85 - i*22)}%, black)`);
    });

    let wedges = "";
    let affordanceDots = "";
    let overflowNotes = [];
    blocks.forEach((b,idx)=>{
      if(b.start===b.end) return;
      const startMin = toMin(b.start);
      const endMin = toMin(b.end);
      const durationMin = endMin - startMin;
      if(durationMin <= 0) return;
      const startHour = Number(b.start.split(":")[0]);
      const isPM = startHour >= 12;
      const Rb = isPM ? R - 15 : R;
      const a1 = (startMin % 720)/720*360;
      const color = shadeFor.get(b);

      if(durationMin >= 720){
        // Erste volle 12-Stunden-Runde: als vollen Kreis zeichnen (nie mehr weiß/leer)
        wedges += `<circle cx="${cx}" cy="${cy}" r="${Rb}" fill="${color}" fill-opacity="0.9"/>`;
        const overflowMin = durationMin - 720;
        if(overflowMin > 0){
          // Zweite Runde: als gestrichelter Ring AUSSERHALB des Ziffernblatts weitergeführt,
          // beginnend an derselben Stelle (a1), damit klar erkennbar ist, dass die Zeit "noch einmal herumgeht".
          const oSweep = Math.min(overflowMin,720)/720*360;
          const oLarge = oSweep > 180 ? 1 : 0;
          const outerR = R + 13;
          const [ox1,oy1] = pt(a1, outerR);
          const [ox2,oy2] = pt(a1+oSweep, outerR);
          wedges += `<path d="M ${ox1.toFixed(2)} ${oy1.toFixed(2)} A ${outerR} ${outerR} 0 ${oLarge} 1 ${ox2.toFixed(2)} ${oy2.toFixed(2)}" stroke="${color}" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="5 4"/>`;
          // kleiner Pfeil am Ende der zweiten Runde als Richtungsindikator
          const [ax,ay] = pt(a1+oSweep, outerR);
          wedges += `<circle cx="${ax.toFixed(2)}" cy="${ay.toFixed(2)}" r="4.5" fill="${color}"/>`;
          overflowNotes.push(`Block ${idx+1}: ${fmtH(durationMin/60)} Std. – läuft ${fmtH(overflowMin/60)} Std. über die erste 12-Std.-Runde hinaus (gestrichelter Außenring)`);
        }
      }else{
        const sweep = durationMin/720*360;
        const a2 = a1 + sweep;
        const large = sweep > 180 ? 1 : 0;
        const [x1,y1] = pt(a1, Rb);
        const [x2,y2] = pt(a2, Rb);
        wedges += `<path class="clock-wedge" data-block-idx="${idx}" d="M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${Rb} ${Rb} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${color}" fill-opacity="0.9" style="cursor:grab; touch-action:none;"/>`;
        affordanceDots += `
          <circle class="drag-affordance-dot" data-block-idx="${idx}" data-which="start" cx="${x1.toFixed(2)}" cy="${y1.toFixed(2)}" r="7" fill="var(--surface)" stroke="${color}" stroke-width="3" style="cursor:grab; touch-action:none;"/>
          <circle class="drag-affordance-dot" data-block-idx="${idx}" data-which="end" cx="${x2.toFixed(2)}" cy="${y2.toFixed(2)}" r="7" fill="${color}" stroke="var(--surface)" stroke-width="2.5" style="cursor:grab; touch-action:none;"/>
        `;
      }
    });

    const face = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>`;

    let ticks = "", numbers = "";
    for(let k=1; k<=12; k++){
      const ang = k===12 ? 0 : k*30;
      const [tx1,ty1] = pt(ang, R-6);
      const [tx2,ty2] = pt(ang, R-14);
      ticks += `<line x1="${tx1.toFixed(1)}" y1="${ty1.toFixed(1)}" x2="${tx2.toFixed(1)}" y2="${ty2.toFixed(1)}" stroke="var(--text-soft)" stroke-width="${(k%3===0)?2.5:1.5}"/>`;
      const [nx,ny] = pt(ang, R-27);
      numbers += `<text x="${nx.toFixed(1)}" y="${(ny+4).toFixed(1)}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text)" font-family="'IBM Plex Mono', monospace">${k}</text>`;
    }

    let nowMarker = "";
    if(editingDate === todayStr()){
      const now = new Date();
      const ang = ((now.getHours()*60+now.getMinutes()) % 720)/720*360;
      const [nx,ny] = pt(ang, R-32);
      nowMarker = `<line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="var(--cat-krank)" stroke-width="2.5" stroke-linecap="round"/>`;
    }

    const overflowCaption = overflowNotes.length ? `
      <div style="max-width:184px; margin-top:8px; padding:8px 10px; border-radius:10px; background:color-mix(in srgb, var(--baustellenorange) 12%, var(--surface)); border:1px dashed var(--baustellenorange); font-size:10.5px; color:var(--text); line-height:1.4;">
        ${svgIcon("refresh",12)} ${overflowNotes.join("<br>")}
      </div>
    ` : "";

    return `
      <div style="display:flex; flex-direction:column; align-items:center;">
        <svg width="184" height="184" viewBox="0 0 200 200">
          ${face}
          ${wedges}
          ${ticks}
          ${numbers}
          ${nowMarker}
          <circle cx="${cx}" cy="${cy}" r="4" fill="var(--text)"/>
          ${affordanceDots}
        </svg>
        ${overflowCaption}
      </div>
    `;
  }

  function attachSiteDragHandlers(list){
    let dragRow = null, startY = 0, rowHeight = 0;

      handle.addEventListener("pointerdown", (e)=>{
        e.preventDefault();
        dragRow = handle.closest(".site-row");

        rowHeight = dragRow.offsetHeight;
        dragRow.classList.add("dragging");
        try{ handle.setPointerCapture(e.pointerId); }catch(err){}
      });
    });

    if(list.dataset.dragBound) return;
    list.dataset.dragBound = "1";

    list.addEventListener("pointermove", (e)=>{
      if(!dragRow) return;
      const deltaY = e.clientY - startY;
      if(Math.abs(deltaY) < rowHeight/2) return;
      const sibling = deltaY > 0 ? dragRow.nextElementSibling : dragRow.previousElementSibling;
      if(!sibling || !sibling.classList.contains("site-row")) return;
      if(deltaY > 0){ list.insertBefore(sibling, dragRow); }
      else{ list.insertBefore(dragRow, sibling); }
      startY = e.clientY;
      SITE_ORDER = Array.from(list.querySelectorAll(".site-row")).map(r=>r.dataset.key);
    });
    list.addEventListener("pointerup", async ()=>{
      if(!dragRow) return;
      dragRow.classList.remove("dragging");

      await saveSiteOrder();

  async function addNewTrade(){

    const label = labelInput.value.trim();

    if(!label){ showToast("Bitte einen Namen eingeben"); return; }

  function toggleVoice(){
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    const btn = document.getElementById("voice-btn");
    if(!SpeechRec){
      showToast("Spracherkennung wird von diesem Browser nicht unterstützt");
      return;
    }
    if(recognizing){ stopVoice(); return; }
    recognizer = new SpeechRec();
    recognizer.lang = "de-DE";
    recognizer.interimResults = false;
    recognizer.continuous = true;
    recognizer.onresult = (ev)=>{
      let text = "";
      for(let i=ev.resultIndex; i<ev.results.length; i++){ text += ev.results[i][0].transcript; }
      const ta = document.getElementById("note-input");
      ta.value = (ta.value ? ta.value + " " : "") + text.trim();
    };
    recognizer.onerror = ()=>{ stopVoice(); showToast("Spracherkennung fehlgeschlagen"); };
    recognizer.onend = ()=>{ if(recognizing) stopVoice(); };
    recognizer.start();
    recognizing = true;
    btn.classList.add("recording");
    btn.title = "Aufnahme läuft… antippen zum Beenden";
  }
  function stopVoice(){
    if(recognizer){ try{ recognizer.stop(); }catch(e){} }
    recognizing = false;
    const btn = document.getElementById("voice-btn");
    if(btn){ btn.classList.remove("recording"); btn.title = "Spracheingabe"; }
  }

  function enableSwipeToClose(drawerEl, closeFn){
    let startX = null, dx = 0, dragging = false;
    drawerEl.addEventListener("pointerdown", (e)=>{
      if(e.target.closest("input, textarea, select, button, a, .menu-cat-items, .menu-drawer-body")) return;
      startX = e.clientX; dx = 0; dragging = true;
      drawerEl.style.transition = "none";
      try{ drawerEl.setPointerCapture(e.pointerId); }catch(err){}
    });
    drawerEl.addEventListener("pointermove", (e)=>{
      if(!dragging) return;
      dx = Math.max(0, e.clientX - startX);
      drawerEl.style.transform = `translateX(${dx}px) scale(1)`;
    });
    const end = ()=>{
      if(!dragging) return;
      dragging = false;
      drawerEl.style.transition = "";
      drawerEl.style.transform = "";
      if(dx > 90) closeFn();
    };
    drawerEl.addEventListener("pointerup", end);
    drawerEl.addEventListener("pointercancel", end);
  }

  function shadeColor(hex, percent){
    hex = hex.replace('#','');
    const num = parseInt(hex,16);
    let r = (num >> 16) + Math.round(2.55*percent);
    let g = ((num >> 8) & 0x00FF) + Math.round(2.55*percent);
    let b = (num & 0x0000FF) + Math.round(2.55*percent);
    r = Math.max(Math.min(255,r),0); g = Math.max(Math.min(255,g),0); b = Math.max(Math.min(255,b),0);
    return "#" + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
  }

  let reminderTimers = {};
  function clearReminderTimer(key){

  function scheduleReminderAt(key){
    clearReminderTimer(key);
    const cfg = REMINDER_CONFIG[key];
    if(!cfg) return;
    const timeStr = cfg.getTime();
    if(!timeStr) return;
    const [h,m] = timeStr.split(":").map(Number);
    const now = new Date();
    const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m||0, 0);
    let delay = target - now;
    if(delay < 0) delay += 24*60*60*1000;
    reminderTimers[key] = setTimeout(()=>{
      try{ new Notification(cfg.title, { body: cfg.body }); }catch(e){}
      if(APP_SETTINGS[key]) scheduleReminderAt(key); // für den nächsten Tag neu terminieren
    }, Math.min(delay, 2147483647));
  }
  async function requestNotifyPermission(){

      const perm = await Notification.requestPermission();
      return perm === "granted";
    }catch(e){ return false; }
  }

  let openMenuCat = null;

  function renderMenuItemRow(item){
    switch(item.type){
      case "toggle":
        return `<button class="menu-item" data-item="${item.id}"><span class="menu-item-label">${item.label}</span><span class="menu-switch ${APP_SETTINGS[item.key]?'on':''}" data-toggle-key="${item.key}"></span></button>`;
      case "choice":
        return `<div class="menu-item" style="cursor:default; flex-wrap:wrap;"><span class="menu-item-label">${item.label}</span><div class="menu-choice-row" data-choice-key="${item.key}">${item.options.map(o=>`<button class="menu-choice-pill ${APP_SETTINGS[item.key]===o?'selected':''}" data-choice-value="${o}">${o}</button>`).join("")}</div></div>`;
      case "text": case "time": case "number":
        return `<div class="menu-item menu-input-row" style="cursor:default;"><span class="menu-item-label">${item.label}${item.suffix?` <span style="color:var(--text-soft); font-weight:400;">(${item.suffix.trim()})</span>`:''}</span><input type="${item.type}" data-input-key="${item.key}" value="${escapeHtml(String(APP_SETTINGS[item.key] ?? ''))}" ${item.step?`step="${item.step}"`:''}/></div>`;
      case "action":
        return `<button class="menu-item ${item.danger?'danger':''}" data-action="${item.action}"><span class="menu-item-label">${item.label}</span>${item.valueCompute?`<span class="menu-item-value" data-compute="${item.valueCompute}"></span>`:''}<svg class="menu-item-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></button>`;
      case "info":
        return `<div class="menu-item" style="cursor:default;"><span class="menu-item-label">${item.label}</span><span class="menu-item-value" ${item.compute?`data-compute="${item.compute}"`:''}>${item.staticText||''}</span></div>`;
      case "note":
        return `<div class="menu-item" style="cursor:default;"><span class="menu-item-label">${item.label}</span><span class="menu-item-note">${item.note}</span></div>`;
      case "static-page":
        return `<button class="menu-item" data-page="${item.page}"><span class="menu-item-label">${item.label}</span><svg class="menu-item-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></button>`;
      default: return "";
    }
  }

  function renderMenuDrawer(){
    const body = document.getElementById("menu-drawer-body");
    body.innerHTML = MENU_STRUCTURE.map(cat=>`
      <div class="menu-cat ${openMenuCat===cat.id?'open':''}" data-cat="${cat.id}">
        <button class="menu-cat-head" data-cattoggle="${cat.id}">
          <span class="menu-cat-icon">${svgIcon(cat.icon, 20)}</span>
          <span class="menu-cat-title">${cat.title}</span>
          <svg class="menu-cat-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="menu-cat-items">${cat.items.map(renderMenuItemRow).join("")}</div>
      </div>
    `).join("");
    attachMenuHandlers();
    refreshMenuComputes();
  }

  function attachMenuHandlers(){
    const body = document.getElementById("menu-drawer-body");
    body.querySelectorAll("[data-cattoggle]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.dataset.cattoggle;
        openMenuCat = (openMenuCat === id) ? null : id;
        renderMenuDrawer();
      };
    });
    body.querySelectorAll("[data-toggle-key]").forEach(sw=>{
      sw.onclick = async (e)=>{
        e.stopPropagation();
        const key = sw.dataset.toggleKey;
        APP_SETTINGS[key] = !APP_SETTINGS[key];
        await saveAppSettings();
        applyAppSettings();
        if(REMINDER_CONFIG[key]){
          const ok = await applyReminderToggle(key);
          if(!ok){ APP_SETTINGS[key] = false; await saveAppSettings(); }
        }
        sw.classList.toggle("on", !!APP_SETTINGS[key]);
      };
    });
    body.querySelectorAll("[data-choice-value]").forEach(pill=>{
      pill.onclick = async (e)=>{
        e.stopPropagation();
        const row = pill.closest("[data-choice-key]");
        const key = row.dataset.choiceKey;
        APP_SETTINGS[key] = pill.dataset.choiceValue;
        await saveAppSettings();
        applyAppSettings();
        row.querySelectorAll(".menu-choice-pill").forEach(p=>p.classList.toggle("selected", p===pill));
      };
    });
    body.querySelectorAll("[data-input-key]").forEach(inp=>{
      inp.onchange = async ()=>{
        APP_SETTINGS[inp.dataset.inputKey] = inp.value;
        await saveAppSettings();
        refreshMenuComputes();
      };
    });
    body.querySelectorAll("[data-action]").forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        const fn = MENU_ACTIONS[btn.dataset.action];
        if(fn) fn();
      };
    });
    body.querySelectorAll("[data-page]").forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); openStaticPage(btn.dataset.page); };
    });
  }

  function refreshMenuComputes(){
    document.querySelectorAll("[data-compute]").forEach(el=>{
      const fn = MENU_COMPUTES[el.dataset.compute];
      if(fn) el.textContent = fn();
    });
  }

  const MENU_COMPUTES = {
    syncStatus: ()=> formatSyncTime() + (hasUnsavedChanges ? " · ungespeicherte Änderungen" : ""),
    defaultSiteLabel: ()=> APP_SETTINGS.defaultSite ? siteLabel(APP_SETTINGS.defaultSite) : "Keine ausgewählt",
    sollMonat: ()=>{
      const weeklyHours = TRADES[selectedTrade]?.hours || 39;
      const now = new Date();
      const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      return fmtH(weeklyHours * (days/7)) + " Std.";
    },
    kvNormal: ()=> fmtH(TRADES[selectedTrade]?.hours || 39) + " Std./Woche",
    statMonth: ()=>{
      const now = new Date();
      return fmtH(monthEntries(now.getFullYear(), now.getMonth()).reduce((a,[,e])=>a+dayHours(e),0)) + " Std.";
    },
    statYear: ()=>{
      const y = new Date().getFullYear();
      let total = 0;
      Object.entries(entries).forEach(([dt,e])=>{ if(dt.startsWith(String(y))) total += dayHours(e); });
      return fmtH(total) + " Std.";
    },
    statOvertime: ()=>{
      const now = new Date();
      const list = monthEntries(now.getFullYear(), now.getMonth());
      const total = list.reduce((a,[,e])=>a+dayHours(e),0);
      const weeklyHours = TRADES[selectedTrade]?.hours || 39;
      const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      const soll = weeklyHours * (days/7);
      const ot = total - soll;
      return (ot>=0?"+":"") + fmtH(ot) + " Std.";
    },
    statVacation: ()=>{
      const y = new Date().getFullYear();
      let count = 0;
      Object.entries(entries).forEach(([dt,e])=>{ if(dt.startsWith(String(y)) && normCat(e.category).includes("urlaub")) count++; });
      return count + " Tage";
    },
    statSick: ()=>{
      const y = new Date().getFullYear();
      let count = 0;
      Object.entries(entries).forEach(([dt,e])=>{ if(dt.startsWith(String(y)) && normCat(e.category).includes("krank")) count++; });
      return count + " Tage";
    },
    statAvg: ()=>{
      const now = new Date();
      const list = monthEntries(now.getFullYear(), now.getMonth()).filter(([,e])=>dayHours(e)>0);
      if(!list.length) return "0,0 Std.";
      return fmtH(list.reduce((a,[,e])=>a+dayHours(e),0)/list.length) + " Std.";
    }
  };

    testMicrophone: ()=>{
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SpeechRec){ showToast("Spracherkennung wird von diesem Browser nicht unterstützt"); return; }
      showToast("Mikrofon-Test läuft… sag etwas");
      try{
        const rec = new SpeechRec();
        rec.lang = APP_SETTINGS.voiceLang === "Englisch" ? "en-US" : "de-AT";
        rec.onresult = (ev)=>{ showToast("Erkannt: " + ev.results[0][0].transcript); };
        rec.onerror = ()=>showToast("Mikrofon-Test fehlgeschlagen");
        rec.start();
        setTimeout(()=>{ try{ rec.stop(); }catch(e){} }, 4000);
      }catch(err){ showToast("Mikrofon-Test fehlgeschlagen"); }
    },
    syncNowAction: ()=> syncNow(),
    createBackup: ()=> downloadDataFile(),
    restoreBackup: ()=> uploadDataFile(),
    exportPdf: ()=>{ closeMenu(); exportMonthPdf(monatCursor); },
    exportExcel: ()=>{
      const now = monatCursor || new Date();
      const list = monthEntries(now.getFullYear(), now.getMonth()).sort((a,b)=>a[0].localeCompare(b[0]));
      let rows = "<table border='1'><tr><th>Datum</th><th>Baustelle</th><th>Kategorie</th><th>Blöcke</th><th>Std.</th><th>Tätigkeit</th></tr>";
      list.forEach(([dt,e])=>{
        rows += `<tr><td>${dt.split('-').reverse().join('.')}</td><td>${siteLabel(e.site)}</td><td>${catLabel(e.category)}</td><td>${e.blocks.map(b=>`${b.start}-${b.end}`).join(", ")}</td><td>${fmtH(dayHours(e))}</td><td>${(e.note||'').replace(/</g,'&lt;')}</td></tr>`;
      });
      rows += "</table>";
      const blob = new Blob([rows], { type:"application/vnd.ms-excel" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `stundennachweis-${now.getFullYear()}-${pad(now.getMonth()+1)}.xls`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 10000);
      showToast("Excel-Datei wird heruntergeladen");
    },
    exportCsv: ()=>{
      const now = monatCursor || new Date();
      const list = monthEntries(now.getFullYear(), now.getMonth()).sort((a,b)=>a[0].localeCompare(b[0]));
      const esc = (s)=>`"${String(s).replace(/"/g,'""')}"`;
      let csv = ["Datum","Baustelle","Kategorie","Bloecke","Stunden","Taetigkeit"].map(esc).join(";") + "\n";
      list.forEach(([dt,e])=>{
        csv += [dt.split('-').reverse().join('.'), siteLabel(e.site), catLabel(e.category), e.blocks.map(b=>`${b.start}-${b.end}`).join(", "), fmtH(dayHours(e)), e.note||""].map(esc).join(";") + "\n";
      });
      const blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `stundennachweis-${now.getFullYear()}-${pad(now.getMonth()+1)}.csv`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 10000);
      showToast("CSV-Datei wird heruntergeladen");
    },

    },
    sendSuggestion: ()=>{
      const body = encodeURIComponent("Mein Verbesserungsvorschlag:\n\n");
      window.location.href = `mailto:feedback@example.com?subject=${encodeURIComponent("Verbesserungsvorschlag – Stundennachweis")}&body=${body}`;
    },
    emailDeveloper: ()=>{
      window.location.href = `mailto:feedback@example.com?subject=${encodeURIComponent("Nachricht zur Stundennachweis-App")}`;
    },
    openContactForm: ()=>{
      const html = `
        <div style="font-size:12px; color:var(--text-soft); margin-bottom:14px; line-height:1.5;">
          Schreib deine Nachricht – sie wird über dein E-Mail-Programm versendet.
        </div>
        <label class="field-label">Deine E-Mail-Adresse</label>
        <input type="text" id="contact-email" placeholder="du@beispiel.at" style="width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--glass-border); background:var(--glass-bg); color:var(--text); font-size:14px; margin-bottom:14px;" />
        <label class="field-label">Nachricht</label>
        <textarea id="contact-message" rows="5" style="width:100%; padding:12px; border-radius:14px; border:1px solid var(--glass-border); background:var(--glass-bg); color:var(--text); font-size:14px; margin-bottom:14px; resize:vertical;"></textarea>
        <button class="primary-btn" id="contact-send">Per E-Mail senden</button>
      `;
      openMenuSub("Kontaktformular", html);
      document.getElementById("contact-send").onclick = ()=>{
        const email = document.getElementById("contact-email").value.trim();
        const msg = document.getElementById("contact-message").value.trim();
        const body = encodeURIComponent((msg||"") + (email ? `\n\nAntwort an: ${email}` : ""));
        window.location.href = `mailto:feedback@example.com?subject=${encodeURIComponent("Kontaktformular – Stundennachweis")}&body=${body}`;
      };
    },
    showPaypalInfo: ()=>{
      const html = `
        <div style="text-align:center; padding:10px 0 4px 0;">
          <div style="margin-bottom:14px;">${svgIcon("unterstuetzung",34)}</div>
          <p style="font-size:13px; color:var(--text-soft); line-height:1.6; margin-bottom:16px;">
            Wenn dir diese App gefällt, kannst du gerne per PayPal an folgende E-Mail-Adresse spenden:
          </p>
          <div style="font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:15px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:14px; padding:12px; margin-bottom:16px;">
            manuel.mayr2@gmail.com
          </div>
          <button class="secondary-btn" id="copy-paypal-email" style="margin-top:0;">E-Mail-Adresse kopieren</button>
        </div>
      `;
      openMenuSub("PayPal-Spende", html);
      document.getElementById("copy-paypal-email").onclick = async ()=>{
        try{ await navigator.clipboard.writeText("manuel.mayr2@gmail.com"); showToast("E-Mail-Adresse kopiert"); }
        catch(e){ showToast("Kopieren nicht möglich – bitte manuell markieren"); }
      };
    },
    unavailable: ()=> showToast("Diese Funktion ist in dieser Web-Vorschau nicht verfügbar")
  };

  const STATIC_PAGES = {
    faq: { title:"FAQ", html:`
      <h3>Wie erfasse ich einen Arbeitstag?</h3><p>Tippe unten auf das Plus-Symbol, wähle Zeiten, Kategorie und Baustelle und speichere.</p>
      <h3>Wie ändere ich mein Gewerbe oder den Stundensatz?</h3><p>Über das Menü unter „Arbeit" bzw. „Kollektivvertrag".</p>
      <h3>Wo finde ich meinen Monatsnachweis?</h3><p>Im Tab „Monat" – dort auch der PDF-Export.</p>
    `},
    anleitung: { title:"Bedienungsanleitung", html:`
      <h3>Grundlagen</h3><p>Über die Tab-Leiste unten wechselst du zwischen Start, Kalender, Woche, Monat und Suche.</p>
      <h3>Einträge bearbeiten</h3><p>Tippe auf einen Tag, um Zeiten, Kategorie, Baustelle und Tätigkeit zu bearbeiten oder per Uhr direkt zu ziehen.</p>
    `},
    erste: { title:"Erste Schritte", html:`
      <h3>Willkommen!</h3><p>Richte zuerst dein Gewerbe und deinen Stundensatz im Menü ein, dann kannst du direkt loslegen.</p>
    `},
    impressum: { title:"Impressum", html:`<p>Prototyp-Anwendung. Kein echtes Impressum hinterlegt.</p>` },
    datenschutz: { title:"Datenschutz", html:`<p>Alle Daten werden ausschließlich lokal in diesem Browser gespeichert. Es findet keine Übertragung an Server statt.</p>` },
    agb: { title:"AGB", html:`<p>Für diese Demo-Anwendung gelten keine gesonderten Geschäftsbedingungen.</p>` },
    lizenz: { title:"Lizenzinformationen", html:`<p>Prototyp zu Demonstrationszwecken.</p>` },
    oss: { title:"Open-Source-Lizenzen", html:`<p>Verwendet Google Fonts (Bebas Neue, IBM Plex Sans/Mono) unter Open-Font-License.</p>` },
    changelog: { title:"Changelog", html:`<p><b>0.9</b> – Hamburger-Menü, Diäten, Gewerbe, Sollstunden, Uhr-Zeiger, PDF-Export u.v.m.</p>` },
  };

  function openMenu(){ renderMenuDrawer(); document.getElementById("menu-overlay").classList.add("open"); }
  function closeMenu(){ document.getElementById("menu-overlay").classList.remove("open"); }
  function openMenuSub(title, html){
    document.getElementById("menu-sub-title").textContent = title;
    document.getElementById("menu-sub-body").innerHTML = `<div class="menu-static-page">${html}</div>`;
    document.getElementById("menu-sub-overlay").classList.add("open");
  }
  function closeMenuSub(){ document.getElementById("menu-sub-overlay").classList.remove("open"); }
  function openStaticPage(page){
    const p = STATIC_PAGES[page];
    if(!p) return;
    openMenuSub(p.title, p.html);
  }

  (async function init(){
    applyAppSettings();
    restoreActiveReminders();
    const tabMap = { "Start":"dashboard", "Kalender":"kalender", "Woche":"woche", "Monat":"monat", "Suche":"suche" };
    activeTab = tabMap[APP_SETTINGS.defaultTab] || "dashboard";
    if(checkDropboxRedirect()){
      await dropboxSyncNow();
      showToast("Mit Dropbox verbunden");
    }
    updateSyncStatusUI();
    render();
  })();
})();
</script>
</body>
